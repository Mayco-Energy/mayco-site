  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

rché en continu et pilote l'installation heure par heure, données à l'appui — vous ne payez que la chaleur livrée.<\u002Fp>\n      <div style=\"margin-top:32px;display:flex;gap:12px\">\n        <a href=\"#contact\" style=\"padding:14px 26px;border-radius:8px;background:{{ p1.ctaBg }};color:{{ p1.ctaTx }};font-weight:600;font-size:15.5px\">Étudier mon site →<\u002Fa>\n        <a href=\"#fonctionnement\" style=\"padding:14px 26px;border-radius:8px;border:1px solid {{ p1.line }};color:{{ p1.ghostTx }};font-weight:600;font-size:15.5px\">Comment ça marche<\u002Fa>\n      <\u002Fdiv>\n      <div style=\"margin-top:44px;border-top:1px solid {{ p1.line }}\">\n        <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid {{ p1.line }}\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:linear-gradient({{ p1.bg }},{{ p1.bg }}) padding-box,linear-gradient(135deg,#2563EB,#FF6B35) border-box;border:2px solid transparent;position:relative\"><span style=\"position:absolute;left:3px;top:4px;width:8px;height:5px;border-left:2px solid #FF6B35;border-bottom:2px solid #FF6B35;transform:rotate(-45deg)\"><\u002Fspan><\u002Fspan><span style=\"font-size:14.5px;color:{{ p1.muted }}\"><strong style=\"color:{{ p1.ink }}\">Facturation à la chaleur livrée<\u002Fstrong> — mesurée par compteur, au MWh<\u002Fspan><\u002Fdiv>\n        <div style=\"display:flex;align-items:center;gap:12px;padding:13px 0;border-bottom:1px solid {{ p1.line }}\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:linear-gradient({{ p1.bg }},{{ p1.bg }}) padding-box,linear-gradient(135deg,#2563EB,#FF6B35) border-box;border:2px solid transparent;position:relative\"><span style=\"position:absolute;left:3px;top:4px;width:8px;height:5px;border-left:2px solid #FF6B35;border-bottom:2px solid #FF6B35;transform:rotate(-45deg)\"><\u002Fspan><\u002Fspan><span style=\"font-size:14.5px;color:{{ p1.muted }}\"><strong style=\"color:{{ p1.ink }}\" r-top:1px solid {{ p1.line }}\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:56px 32px\">\n      <div style=\"background:{{ p1.band }};border:1px solid {{ p1.line }};border-radius:20px;padding:28px 28px 16px;overflow-x:auto\">\n        <div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.14em;color:{{ p1.acc }};margin:0 0 8px 4px\">LE SYSTÈME — DE L'ÉLECTRON À LA CHALEUR<\u002Fdiv>\n        <svg sc-camel-view-box=\"0 0 970 250\" role=\"img\" aria-label=\"Schéma : l'électricité achetée aux meilleures heures alimente la pompe à chaleur, la chaleur est stockée dans le ballon puis livrée au process ; la chaudière gaz reste en secours.\" style=\"min-width:740px;width:100%;height:auto;display:block\">\n          <path d=\"M70 46 C260 8, 700 8, 870 46\" fill=\"none\" stroke=\"{{ p1.muted }}\" stroke-width=\"1.6\" stroke-dasharray=\"5 6\" opacity=\".55\"><\u002Fpath>\n          <rect x=\"366\" y=\"6\" width=\"208\" height=\"32\" rx=\"16\" fill=\"{{ p1.ctaBg }}\"><\u002Frect>\n          <text x=\"470\" y=\"27\" text-anchor=\"middle\" font-size=\"13.5\" font-weight=\"600\" fill=\"{{ p1.ctaTx }}\">Pilotage intelligent Mayco<\u002Ftext>\n          <path d=\"M40 130 C75 105, 110 155, 145 130 S 215 105 250 128\" fill=\"none\" stroke=\"#2563EB\" stroke-width=\"11\" stroke-linecap=\"round\" opacity=\".22\"><\u002Fpath>\n          <path style=\"stroke-dasharray:10 7;animation:flow 1.6s linear infinite\" d=\"M40 130 C75 105, 110 155, 145 130 S 215 105 250 128\" fill=\"none\" stroke=\"#2563EB\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n          <text x=\"150\" y=\"175\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"600\" fill=\"{{ p1.ink }}\">Électricité<\u002Ftext>\n          <text x=\"150\" y=\"194\" text-anchor=\"middle\" font-size=\"12.5\" fill=\"{{ p1.muted }}\">achetée aux meilleures heures<\u002Ftext>\n          <rect x=\"292\" y=\"92\" width=\"76\" height=\"76\" rx=\"18\" fill=\"{{ p1.card }}\" stroke=\"{{ p1 =\"{{ p1.muted }}\">charge quand l'électricité<\u002Ftext>\n          <text x=\"508\" y=\"227\" text-anchor=\"middle\" font-size=\"12.5\" fill=\"{{ p1.muted }}\">est bon marché<\u002Ftext>\n          <path d=\"M550 120 C585 98, 620 142, 655 120 S 685 102 702 116\" fill=\"none\" stroke=\"#FF9333\" stroke-width=\"11\" stroke-linecap=\"round\" opacity=\".22\"><\u002Fpath>\n          <path style=\"stroke-dasharray:10 7;animation:flow 1.6s linear infinite\" d=\"M550 120 C585 98, 620 142, 655 120 S 685 102 702 116\" fill=\"none\" stroke=\"#FF9333\" stroke-width=\"5\" stroke-linecap=\"round\"><\u002Fpath>\n          <text x=\"626\" y=\"88\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"600\" fill=\"#FF9333\">Chaleur livrée en continu<\u002Ftext>\n          <g transform=\"translate(886,100)\">\n            <rect x=\"0\" y=\"6\" width=\"26\" height=\"30\" rx=\"5\" fill=\"{{ p1.muted }}\"><\u002Frect>\n            <path d=\"M6 40 V44 M20 40 V44\" stroke=\"{{ p1.muted }}\" stroke-width=\"3\" stroke-linecap=\"round\"><\u002Fpath>\n            <circle cx=\"13\" cy=\"17\" r=\"5.5\" fill=\"{{ p1.bg }}\"><\u002Fcircle>\n            <circle cx=\"13\" cy=\"17\" r=\"2.4\" fill=\"#FF9333\"><\u002Fcircle>\n          <\u002Fg>\n          <text x=\"899\" y=\"172\" text-anchor=\"middle\" font-size=\"12\" fill=\"{{ p1.muted }}\">Votre chaudière gaz,<\u002Ftext>\n          <text x=\"899\" y=\"188\" text-anchor=\"middle\" font-size=\"12\" fill=\"{{ p1.muted }}\">en secours<\u002Ftext>\n          <path d=\"M800 126 H882\" fill=\"none\" stroke=\"{{ p1.muted }}\" stroke-width=\"2.6\" stroke-dasharray=\"7 6\" stroke-linecap=\"round\"><\u002Fpath>\n          <g transform=\"translate(712,87)\">\n            <path d=\"M22 46 V16 H38 V46 Z\" transform=\"scale(0.7)\" fill=\"{{ p1.ink }}\" stroke=\"{{ p1.ink }}\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath>\n            <path d=\"M10 118 V44 L46 66 V44 L82 66 V44 L118 66 V118 Z\" transform=\"scale(0.7)\" fill=\"{{ p1.ink }}\" stroke=\"{{ p1.ink }}\" stroke-width=\"3.4\" stroke-linejoin=\"round\"><\u002Fpath>\n          <\u002Fg>\n          <text x=\"767\" y=\"192\" text-anchor=\"middle\" font-size=\"14\" font-weight=\"600\" fill=\"{{ p1.ink }}\">Votre site industriel<\u002Ftext>\n        <\u002Fsvg>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section id=\"solution\" data-screen-label=\"Solution FR\" style=\"border-top:1px solid {{ p1.line }}\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:64px 32px\">\n      <div style=\"display:flex;align-items:baseline;justify-content:space-between;margin-bottom:16px\">\n        <h2 style=\"margin:0;font-size:32px;font-weight:800;letter-spacing:-.02em\">Une chaleur plus attirante, sur toute la ligne.<\u002Fh2>\n        <span style=\"font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:{{ p1.acc }}\">La solution<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"position:relative;height:520px\">\n        <img src=\"50d2c8ca-fdde-4f1f-9d9a-ee4d22516670\" alt=\"Installation thermique industrielle\" style=\"display:block;margin:0 auto;width:640px;height:440px;object-fit:cover;border-radius:28px;margin-top:40px\">\n        <div style=\"position:absolute;top:40px;left:35px;max-width:295px;background:{{ p1.cap }};backdrop-filter:blur(10px);border:1px solid {{ p1.line }};border-radius:18px;padding:20px 22px;box-shadow:{{ p1.shadow }}\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#2563EB\"><\u002Fspan><h3 style=\"margin:0;font-size:17px;font-weight:700\">Moins chère<\u002Fh3><\u002Fdiv><p style=\"margin:0;font-size:14px;line-height:1.55;color:{{ p1.muted }}\">Nos algorithmes achètent l'électricité aux meilleures heures du marché et stockent la chaleur. Les creux de prix, captés automatiquement.<\u002Fp><\u002Fdiv>\n        <div style=\"position:absolute;top:20px;right:80px;max-width:280px;background:{{ p1.cap }};backdrop-filter:blur(10px);border:1px solid {{ p1.line }};border-radius:18px;padding:20px 22px;box-shadow:{{ p1.shadow }}\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#2563EB\"><\u002Fspan><h3 style=\"margin:0;font-size:17px;font-weight:700\">Décarbonée<\u002Fh3><\u002Fdiv><p style=\"margin:0;font-size:14px;line-height:1.55;color:{{ p1.muted }}\">Plusieurs kWh de chaleur par kWh d'électricité : vos émissions baissent fortement, votre trajectoire bas carbone avance.<\u002Fp><\u002Fdiv>\n        <div style=\"position:absolute;bottom:115px;left:95px;max-width:280px;background:{{ p1.cap }};backdrop-filter:blur(10px);border:1px solid {{ p1.line }};border-radius:18px;padding:20px 22px;box-shadow:{{ p1.shadow }}\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#F59E0B\"><\u002Fspan><h3 style=\"margin:0;font-size:17px;font-weight:700\">Dérisquée<\u002Fh3><\u002Fdiv><p style=\"margin:0;font-size:14px;line-height:1.55;color:{{ p1.muted }}\">Votre chaudière gaz reste en place. À chaque instant, l'IA arbitre entre électricité et gaz et bascule sur la plus compétitive.<\u002Fp><\u002Fdiv>\n        <div style=\"position:absolute;bottom:140px;right:100px;max-width:300px;background:{{ p1.cap }};backdrop-filter:blur(10px);border:1px solid {{ p1.line }};border-radius:18px;padding:20px 22px;box-shadow:{{ p1.shadow }}\"><div style=\"display:flex;align-items:center;gap:9px;margin-bottom:9px\"><span style=\"width:10px;height:10px;border-radius:50%;background:#FF6B35\"><\u002Fspan><h3 style=\"margin:0;font-size:17px;font-weight:700\">Clé en main<\u002Fh3><\u002Fdiv><p style=\"margin:0;font-size:14px;line-height:1.55;color:{{ p1.muted }}\">Mayco finance, installe, exploite et supervise l'installation à distance. Vous signez un contrat de chaleur, la tech fait le reste.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section id=\"fonctionnement\" data-screen-label=\"Fonctionnement FR\" style=\"border-top:1px solid {{ p1.line }};background:{{ p1.band }}\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:72px 32px\">\n      <span style=\"font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:{{ p1.acc }}\">Comment ça marche<\u002Fspan>\n      <h2 style=\"margin:14px 0 0;font-size:32px;font-weight:800;letter-spacing:-.02em;max-width:640px\">Une PAC, un ballon, et des algorithmes qui suivent le marché pour vous.<\u002Fh2>\n      <div style=\"margin-top:40px;display:grid;grid-template-columns:repeat(4,1fr);gap:18px\">\n        <div style=\"background:{{ p1.card }};border:1px solid {{ p1.line }};border-radius:14px;padding:24px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:{{ p1.acc }};margin-bottom:12px\">ÉTAPE 01<\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:16.5px;font-weight:700\">La PAC produit votre chaleur<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:{{ p1.muted }}\">Une pompe à chaleur haute température, dimensionnée pour votre process, produit votre chaleur à partir d'électricité, avec un rendement très supérieur à une chaudière.<\u002Fp><\u002Fdiv>\n        <div style=\"background:{{ p1.card }};border:1px solid {{ p1.line }};border-radius:14px;padding:24px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:{{ p1.acc }};margin-bottom:12px\">ÉTAPE 02<\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:16.5px;font-weight:700\">Le ballon la stocke<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:{{ p1.muted }}\">La chaleur produite pendant les heures d'électricité bon marché est stockée dans un ballon d'eau chaude, puis restituée quand votre process en a besoin.<\u002Fp><\u002Fdiv>\n        <div style=\"background:{{ p1.card }};border:1px solid {{ p1.line }};border-radius:14px;padding:24px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:{{ p1.acc }};margin-bottom:12px\">ÉTAPE 03<\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:16.5px;font-weight:700\">L'algorithme arbitre en continu<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:{{ p1.muted }}\">Nos algorithmes suivent les prix de marché heure par heure et décident : produire, stocker, ou basculer sur votre chaudière gaz si c'est elle la plus économique.<\u002Fp><\u002Fdiv>\n        <div style=\"background:{{ p1.card }};border:1px solid {{ p1.line }};border-radius:14px;padding:24px\"><div style=\"font-family:'IBM Plex Mono',monospace;font-size:11.5px;letter-spacing:.1em;color:{{ p1.acc }};margin-bottom:12px\">ÉTAPE 04<\u002Fdiv><h3 style=\"margin:0 0 8px;font-size:16.5px;font-weight:700\">Vous payez la chaleur livrée<\u002Fh3><p style=\"margin:0;font-size:13.5px;line-height:1.55;color:{{ p1.muted }}\">Un compteur d'énergie mesure la chaleur réellement consommée. Une facture, un interlocuteur, aucune surprise.<\u002Fp><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n  <section id=\"modele\" data-screen-label=\"Modèle FR\" style=\"border-top:1px solid {{ p1.line }}\">\n    <div style=\"max-width:1160px;margin:0 auto;padding:72px 32px\">\n      <span style=\"font-size:13px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:{{ p1.acc }}\">Le modèle<\u002Fspan>\n      <h2 style=\"margin:14px 0 0;font-size:32px;font-weight:800;letter-spacing:-.02em;max-width:640px\">La chaleur comme un service : nous investissons, vous économisez.<\u002Fh2>\n      <div style=\"margin-top:40px;display:grid;grid-template-columns:1.1fr .9fr;gap:48px;align-items:start\">\n        <div>\n          <p style=\"margin:0;color:{{ p1.muted }};font-size:15.5px;line-height:1.65\"><strong style=\"color:{{ p1.ink }}\">Mayco possède et exploite l'installation.<\u002Fstrong> La pompe à chaleur, le ballon et le pilotage sont financés par Mayco et installés sur votre site, en complément de votre chaudière existante.<\u002Fp>\n          <p style=\"margin:14px 0 0;color:{{ p1.muted }};font-size:15.5px;line-height:1.65\">Vous n'achetez pas un équipement, vous achetez de la chaleur : un contrat de fourniture, une facturation au MWh de chaleur livré. Pas d'investissement à porter, pas de risque technique, pas de compétence énergie à internaliser.<\u002Fp>\n          <p style=\"margin:14px 0 0;color:{{ p1.muted }};font-size:15.5px;line-height:1.65\">Tout commence par une étude de faisabilité sur vos données réelles de consommation : notre moteur de simulation rejoue vos douze derniers mois heure par heure, face aux prix de marché constatés, et chiffre l'économie sur votre cas. Pas de promesse générique.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:{{ p1.card }};border:1px solid {{ p1.line }};border-radius:16px;padding:28px\">\n          <h3 style=\"margin:0 0 14px;font-size:16.5px;font-weight:700\">Ce que ça change pour vous<\u002Fh3>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid {{ p1.line }};font-size:14px;color:{{ p1.muted }}\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:linear-gradient({{ p1.card }},{{ p1.card }}) padding-box,linear-gradient(135deg,#2563EB,#FF6B35) border-box;border:2px solid transparent;position:relative\"><span style=\"position:absolute;left:3px;top:4px;width:8px;height:5px;border-left:2px solid #FF6B35;border-bottom:2px solid #FF6B35;transform:rotate(-45deg)\"><\u002Fspan><\u002Fspan>Aucun investissement, aucun financement à monter<\u002Fdiv>\n          <div style=\"display:flex;align-items:center;gap:12px;padding:11px 0;border-top:1px solid {{ p1.line }};font-size:14px;color:{{ p1.muted }}\"><span style=\"flex:none;width:18px;height:18px;border-radius:50%;background:linear-gradient({{ p1.card }},{{ p1.card }}) padding-box,linear-gradient(135deg,#2563EB,#FF6B35)
